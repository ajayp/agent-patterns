<svg width="100%" viewBox="0 0 700 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Workflow vs Agent</title>
  <desc>Side-by-side comparison: a workflow is a fixed sequence of steps you define; an agent is a loop where the model decides the next step, takes an action, and observes the result.</desc>
  <defs>
    <marker id="wa-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Panel: Workflow -->
  <rect x="10" y="10" width="330" height="320" rx="12" fill="none" stroke="rgb(90,88,82)" stroke-width="1"/>
  <text x="34" y="46" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:20px;font-weight:700;fill:rgb(230,228,220)">Workflow</text>
  <text x="34" y="68" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:13px;fill:rgb(175,169,236)">you decide the steps</text>

  <!-- Workflow boxes -->
  <g stroke="rgb(133,183,235)" stroke-width="1" fill="rgb(12,68,124)">
    <rect x="30" y="190" width="60" height="55" rx="8"/>
    <rect x="105" y="190" width="60" height="55" rx="8"/>
    <rect x="180" y="190" width="60" height="55" rx="8"/>
  </g>
  <rect x="255" y="190" width="65" height="55" rx="8" fill="rgb(72,58,10)" stroke="rgb(226,184,90)" stroke-width="1"/>

  <g style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(181,212,244);text-anchor:middle">
    <text x="60" y="222">Step 1</text>
    <text x="135" y="222">Step 2</text>
    <text x="210" y="222">Step 3</text>
  </g>
  <text x="287" y="222" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:600;fill:rgb(240,209,140)">Result</text>

  <g stroke="rgb(156,154,146)" stroke-width="1.5" fill="none">
    <line x1="90" y1="217" x2="105" y2="217" marker-end="url(#wa-arrow)"/>
    <line x1="165" y1="217" x2="180" y2="217" marker-end="url(#wa-arrow)"/>
    <line x1="240" y1="217" x2="255" y2="217" marker-end="url(#wa-arrow)"/>
  </g>

  <text x="34" y="290" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;fill:rgb(194,192,182)">predictable · debuggable · cheap</text>

  <!-- Panel: Agent -->
  <rect x="360" y="10" width="330" height="320" rx="12" fill="none" stroke="rgb(90,88,82)" stroke-width="1"/>
  <text x="384" y="46" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:20px;font-weight:700;fill:rgb(230,228,220)">Agent</text>
  <text x="384" y="68" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:13px;fill:rgb(240,153,123)">model decides the steps</text>

  <!-- Row: Goal -> LLM decides -> Take action -->
  <rect x="374" y="120" width="66" height="55" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="1"/>
  <text x="407" y="152" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(206,203,246)">Goal</text>

  <rect x="470" y="120" width="80" height="55" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="1"/>
  <text x="510" y="145" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(245,196,179)">LLM</text>
  <text x="510" y="161" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(245,196,179)">decides</text>

  <rect x="590" y="120" width="80" height="55" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="1"/>
  <text x="630" y="145" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(245,196,179)">Take</text>
  <text x="630" y="161" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:500;fill:rgb(245,196,179)">action</text>

  <!-- Goal -> LLM decides -->
  <line x1="440" y1="147" x2="470" y2="147" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#wa-arrow)"/>

  <!-- LLM decides -> Take action -->
  <line x1="550" y1="147" x2="590" y2="147" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#wa-arrow)"/>

  <!-- Take action -> loop back up to LLM decides -->
  <path d="M 630 120 C 630 92, 510 92, 510 120" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#wa-arrow)"/>

  <!-- LLM decides -> Result -->
  <line x1="510" y1="175" x2="510" y2="215" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#wa-arrow)"/>

  <rect x="470" y="222" width="80" height="55" rx="8" fill="rgb(72,58,10)" stroke="rgb(226,184,90)" stroke-width="1"/>
  <text x="510" y="254" text-anchor="middle" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;font-weight:600;fill:rgb(240,209,140)">Result</text>

  <text x="384" y="304" style="font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:12px;fill:rgb(194,192,182)">flexible · slower · harder to debug</text>
</svg>
